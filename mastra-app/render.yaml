services:
  - type: web
    name: mastra-agent-api
    env: docker
    region: oregon # can be changed to frankfurt, ohio, singapore
    plan: free     # can be upgraded if needed
    envVars:
      - key: PORT
        value: "3001"
      - key: GOOGLE_API_KEY
        sync: false # You will provide this manually in the Render Dashboard
      - key: GOOGLE_GENERATIVE_AI_API_KEY
        sync: false # You will provide this manually in the Render Dashboard
      - key: EXA_API_KEY
        sync: false # You will provide this manually in the Render Dashboard
      - key: WORLD_MONITOR_BASE_URL
        value: "http://localhost:8080" # Change this if World Monitor is deployed elsewhere

